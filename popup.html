<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoProc - InfoVita</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="timer-card">
        <small class="timer-label">TIEMPO ENFOCADO</small>
        <div id="display" class="timer-display">00:00</div>
        <div id="status-text" class="status-inactive">MODO ESPERA</div>
      </div>
    </header>

    <main>
      <div id="blacklist-config" class="hidden">
        <div class="input-group">
          <label for="blacklist">DOMINIOS RESTRINGIDOS</label>
          <textarea id="blacklist" placeholder="Ej: youtube.com, x.com"></textarea>
        </div>
      </div>
      
      <div class="config-toggle-container">
        <button id="toggleBlacklist" class="btn-link">⚙️ CONFIGURAR SITIOS BLOQUEADOS</button>
      </div>

      <div class="stats-card">
        <h3>REPORTE SEMANAL</h3>
        <div class="chart-container">
          <div id="ideal-line" class="ideal-line"><span>6H META</span></div>
          <div id="stats-chart" class="stats-chart"></div>
        </div>
      </div>

      <div class="actions">
        <button id="startBtn" class="btn-primary">ACTIVAR ESCUDO</button>
        <button id="stopBtn" class="btn-secondary hidden">DETENER SESIÓN</button>
      </div>
    </main>

    <footer>
      <a href="https://infovita.com.ar" target="_blank">Desarrollado por InfoVita</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
